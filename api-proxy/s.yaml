edition: 3.0.0
name: turtle-soup-ai-proxy
access: default

vars:
  region: cn-wulanchabu

resources:
  api_proxy:
    component: fc3
    props:
      region: ${vars.region}
      functionName: turtle-soup-ai-proxy
      description: Turtle Soup AI server-side API proxy
      runtime: nodejs20
      code: ./
      handler: index.handler
      timeout: 60
      memorySize: 512
      cpu: 0.35
      diskSize: 512
      instanceConcurrency: 20
      internetAccess: true
      environmentVariables:
        AGNES_API_KEY: ${env('AGNES_API_KEY')}
        UNITY_API_KEY: ${env('UNITY_API_KEY')}
        DEEPSEEK_API_KEY: ${env('DEEPSEEK_API_KEY')}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - OPTIONS
